<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>보고서 열람 | KickScout</title>
<style>
  :root {
    --bg:#040608; --surface:#0d1117; --border:rgba(255,255,255,.1);
    --text:#e8e8e8; --muted:rgba(255,255,255,.45);
    --accent:#00e5a0; --accent2:#00aaff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace,sans-serif;min-height:100vh;padding:40px 20px;}
  .wrap{max-width:680px;margin:0 auto;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--accent);margin-bottom:6px;}
  .back{font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;display:inline-block;margin-bottom:40px;}
  .back:hover{color:var(--accent);}
  h1{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:24px;}
  .card{border:1px solid var(--border);border-radius:6px;padding:28px;background:var(--surface);margin-bottom:16px;}
  .label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:4px;
    color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:16px;padding:14px 16px;
    letter-spacing:3px;text-transform:uppercase;outline:none;margin-bottom:16px;}
  input:focus{border-color:var(--accent);}
  .btn{width:100%;padding:16px;background:var(--accent);color:#040608;border:none;border-radius:4px;
    font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;letter-spacing:2px;
    cursor:pointer;text-transform:uppercase;}
  .btn:hover{opacity:.9;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .status{font-size:12px;color:var(--muted);margin-top:12px;min-height:20px;}
  .err{color:#ff6b6b;}

  /* 보고서 결과 */
  .report-wrap{display:none;}
  .report-header{display:flex;justify-content:space-between;align-items:flex-start;
    padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:16px;}
  .player-name{font-family:'GPZ쾌청','Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--text);}
  .player-meta{font-size:11px;color:var(--muted);margin-top:6px;}
  .score-big{font-family:'IBM Plex Mono',monospace;font-size:48px;color:var(--accent);font-weight:700;}
  .grade-text{font-size:11px;letter-spacing:2px;color:var(--muted);}

  .section{border:1px solid var(--border);border-radius:4px;padding:20px;margin-bottom:12px;background:rgba(255,255,255,.02);}
  .section-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .section-body{font-size:13px;line-height:1.9;color:var(--text);}
  .tag{display:inline-block;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);
    border-radius:3px;padding:2px 8px;font-size:11px;color:var(--accent);margin-right:6px;margin-top:4px;}
  .diag-row{display:flex;gap:16px;margin-bottom:12px;}
  .diag-box{flex:1;padding:14px;border:1px solid var(--border);border-radius:4px;background:rgba(255,255,255,.02);}
  .diag-label{font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
  .diag-title{font-size:15px;font-weight:700;color:var(--accent2);margin-bottom:4px;}
  .diag-desc{font-size:12px;color:var(--muted);line-height:1.7;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">KICKSCOUT</div>
  <a href="/" class="back">← 메인으로</a>

  <h1>보고서 열람</h1>

  <div class="card" id="inputCard">
    <div class="label">보고서 코드 입력</div>
    <input type="text" id="codeInput" placeholder="KS-0000-XXXX" maxlength="12"
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter') fetchReport()"/>
    <button class="btn" onclick="fetchReport()" id="fetchBtn">보고서 불러오기</button>
    <div class="status" id="statusMsg"></div>
  </div>

  <div class="report-wrap" id="reportWrap">
    <div class="report-header">
      <div>
        <div class="player-name" id="rName">-</div>
        <div class="player-meta" id="rMeta">-</div>
      </div>
      <div style="text-align:right;">
        <div class="score-big" id="rScore">-</div>
        <div class="grade-text" id="rGrade">-</div>
      </div>
    </div>

    <!-- 에이전트 총평 -->
    <div class="section" id="secAgent" style="display:none;">
      <div class="section-title">⚡ 에이전트 총평</div>
      <div class="section-body" id="rAgentAnalysis"></div>
    </div>

    <!-- 핵심 진단 -->
    <div class="section" id="secDiag" style="display:none;">
      <div class="section-title">🔍 핵심 진단</div>
      <div class="diag-row">
        <div class="diag-box">
          <div class="diag-label">가장 강한 것</div>
          <div class="diag-title" id="rStrength">-</div>
          <div class="diag-desc" id="rStrengthDesc">-</div>
        </div>
        <div class="diag-box">
          <div class="diag-label">지금 당장 고쳐야 할 것</div>
          <div class="diag-title" id="rWeakness">-</div>
          <div class="diag-desc" id="rWeaknessDesc">-</div>
        </div>
      </div>
      <div class="diag-box" style="margin-top:8px;">
        <div class="diag-label">지금 당장 해야 할 단 한 가지</div>
        <div class="diag-title" id="rAction">-</div>
        <div class="diag-desc" id="rActionDesc">-</div>
      </div>
    </div>

    <!-- 포지션 분석 -->
    <div class="section" id="secPos" style="display:none;">
      <div class="section-title">⚽ 포지션 분석</div>
      <div style="display:flex;gap:12px;margin-bottom:12px;">
        <div><span style="font-size:10px;color:var(--muted);">현재</span><br>
          <span id="rCurrentPos" style="font-size:18px;font-weight:700;color:var(--accent2);">-</span></div>
        <div style="color:var(--muted);font-size:20px;align-self:center;">→</div>
        <div><span style="font-size:10px;color:var(--muted);">추천</span><br>
          <span id="rRecommendPos" style="font-size:18px;font-weight:700;color:var(--accent);">-</span></div>
      </div>
      <div class="section-body" id="rPositionDeep"></div>
    </div>

    <!-- 에이전트 종합 총평 -->
    <div class="section" id="secScout" style="display:none;">
      <div class="section-title">📋 에이전트 종합 총평</div>
      <div class="section-body" id="rScout"></div>
    </div>

    <!-- 훈련 플랜 -->
    <div class="section" id="secTraining" style="display:none;">
      <div class="section-title">💪 맞춤 훈련 처방</div>
      <div id="rTraining"></div>
    </div>

    <!-- 6주 플랜 -->
    <div class="section" id="secWeek" style="display:none;">
      <div class="section-title">📅 6주 훈련 플랜</div>
      <div id="rWeekPlan"></div>
    </div>

    <div style="text-align:center;margin-top:24px;">
      <a href="/" style="color:var(--accent);font-size:12px;letter-spacing:1px;">새 분석 시작하기 →</a>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-2j_oxGVrfoElqlhUzo8lsEcSm7gJXzi4WXxpbyGwN5Vl9u80mEFN3Y0jcmWUhw-uiQ/exec';

async function fetchReport() {
  var code = document.getElementById('codeInput').value.trim().toUpperCase();
  var btn = document.getElementById('fetchBtn');
  var statusEl = document.getElementById('statusMsg');

  if (!code || code.length < 8) {
    statusEl.textContent = '올바른 코드를 입력해주세요 (예: KS-0402-ABCD)';
    statusEl.className = 'status err';
    return;
  }

  btn.disabled = true;
  statusEl.textContent = '보고서를 불러오는 중...';
  statusEl.className = 'status';

  try {
    var resp = await fetch(APPS_SCRIPT_URL + '?action=getReport&code=' + encodeURIComponent(code));
    var result = await resp.json();

    if (result.status === 'ok' && result.reportJson) {
      var data = JSON.parse(result.reportJson);
      renderReport(result, data);
    } else {
      statusEl.textContent = '코드를 찾을 수 없습니다. 코드를 다시 확인해주세요.';
      statusEl.className = 'status err';
    }
  } catch(e) {
    statusEl.textContent = '불러오기 실패. 잠시 후 다시 시도해주세요.';
    statusEl.className = 'status err';
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

function renderReport(result, data) {
  document.getElementById('statusMsg').textContent = '';
  document.getElementById('reportWrap').style.display = 'block';

  // 헤더
  document.getElementById('rName').textContent = result.name || '-';
  document.getElementById('rScore').textContent = parseFloat(result.score).toFixed(2);
  document.getElementById('rGrade').textContent = result.grade || '-';
  document.getElementById('rMeta').textContent = (data.recommendPos || '') + ' | 분석 완료';

  // 에이전트 총평
  if (data.agentAnalysis) {
    document.getElementById('rAgentAnalysis').innerHTML =
      '<p>' + data.agentAnalysis.split('\n').join('</p><p>') + '</p>';
    document.getElementById('secAgent').style.display = 'block';
  }

  // 핵심 진단
  if (data.strength || data.weakness) {
    document.getElementById('rStrength').textContent = data.strength || '-';
    document.getElementById('rStrengthDesc').textContent = data.strengthDesc || '';
    document.getElementById('rWeakness').textContent = data.weakness || '-';
    document.getElementById('rWeaknessDesc').textContent = data.weaknessDesc || '';
    document.getElementById('rAction').textContent = data.action || '-';
    document.getElementById('rActionDesc').textContent = data.actionDesc || '';
    document.getElementById('secDiag').style.display = 'block';
  }

  // 포지션
  if (data.recommendPos) {
    document.getElementById('rCurrentPos').textContent = data.recommendPos;
    document.getElementById('rRecommendPos').textContent = data.recommendPos;
    var deepTxt = data.positionDeepAnalysis || data.currentReason || '';
    document.getElementById('rPositionDeep').innerHTML =
      '<p>' + deepTxt.split('\n').join('</p><p>') + '</p>';
    document.getElementById('secPos').style.display = 'block';
  }

  // 종합 총평
  if (data.scout) {
    document.getElementById('rScout').innerHTML =
      '<p>' + data.scout.split('\n').join('</p><p>') + '</p>';
    document.getElementById('secScout').style.display = 'block';
  }

  // 훈련 처방
  if (data.training && data.training.length) {
    var tHtml = data.training.map(function(t, i) {
      return '<div style="margin-bottom:14px;"><div style="font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:4px;">'
        + (i+1) + '. ' + t.title + '</div>'
        + '<div style="font-size:12px;color:var(--muted);line-height:1.7;">' + t.desc + '</div></div>';
    }).join('');
    document.getElementById('rTraining').innerHTML = tHtml;
    document.getElementById('secTraining').style.display = 'block';
  }

  // 6주 플랜
  if (data.weekPlan && data.weekPlan.length) {
    var wHtml = data.weekPlan.map(function(w) {
      return '<div style="margin-bottom:12px;padding:12px;border:1px solid var(--border);border-radius:4px;">'
        + '<div style="font-size:10px;color:var(--accent);letter-spacing:2px;margin-bottom:4px;">' + w.week + '</div>'
        + '<div style="font-size:13px;font-weight:700;margin-bottom:4px;">' + w.title + '</div>'
        + '<div style="font-size:12px;color:var(--muted);line-height:1.7;">' + w.desc + '</div></div>';
    }).join('');
    document.getElementById('rWeekPlan').innerHTML = wHtml;
    document.getElementById('secWeek').style.display = 'block';
  }

  // 스크롤
  document.getElementById('reportWrap').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
